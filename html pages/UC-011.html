<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC-011 Edit/Delete Product</title>
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <div class="logo">
        <a href="#">Grocery Store</a>
        <div class="searchBar">
            <input type="text" id="search" placeholder="Search listings">
            <button type="submit">Search</button>
        </div>
    </div>

    <div class="mainContainer">
        <aside class="filtersContainer">
            <h2>Edit/Delete Product</h2>
            <hr>

            <h3>Filters</h3>
            <p class="sectionLabel">Status</p>

            <div>
                <input type="checkbox" id="active">
                <label for="active">Active</label>
            </div>

            <div>
                <input type="checkbox" id="draft">
                <label for="draft">Draft</label>
            </div>

            <div>
                <input type="checkbox" id="sold">
                <label for="sold">Sold</label>
            </div>
        </aside>

        <main class="itemsContainer">
            <h2>My Listings</h2>
            <p class="itemMeta">
                Select a product and choose <strong>Edit</strong> or <strong>Delete</strong>.
            </p>

            <div class="productCard">
                <div class="productTop">
                    <div>
                        <h3>Organic Apples (1 lb)</h3>
                        <p class="itemMeta">
                            <span class="statusTag">Active</span>
                            <span class="statusTag">$3.99</span>
                        </p>
                        <p class="itemMeta">Fresh organic apples. Delivery within 2–3 days.</p>
                    </div>

                    <div class="productActions">
                        <a class="btn btnEdit" href="edit-product.html">Edit</a>
                        <a class="btn btnDelete" href="delete-product.html">Delete</a>
                    </div>
                </div>
            </div>

            <div class="productCard">
                <div class="productTop">
                    <div>
                        <h3>Milk 2% (1 gallon)</h3>
                        <p class="itemMeta">
                            <span class="statusTag">Draft</span>
                            <span class="statusTag">$4.49</span>
                        </p>
                        <p class="itemMeta">Draft listing not visible to buyers yet.</p>
                    </div>

                    <div class="productActions">
                        <a class="btn btnEdit" href="edit-product.html">Edit</a>
                        <a class="btn btnDelete" href="delete-product.html">Delete</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
