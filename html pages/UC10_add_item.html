<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/UC10_add_item.css">
</head>
<body>
    <div class="logo">
        <a href="#">Grocery Store</a>
        <input type="text" class="form-control" id="search" placeholder="Search">
        <button type="submit" class="btn btn-primary">Search</button>
        <a href="#">Cart</a>
    </div> 

    <div class="mainContainer">
        <div class="productContainer">
            <div class="productImage">
                <input type="image" class="form-control" src="../resources/input_image.jpg" alt="Submit">
            </div>
            <div class="productDesc">
                <h1>Product Information</h1>
                <input type="text" class="form-control" id="item_name" placeholder="Product Name">
                <input type="text" class="form-control" id="item_price" placeholder="Product price ($00.00)">
                <input type="text" class="form-control" id="item_desc" placeholder="Product Description">
                <button type="submit" class="btn btn-primary">Add Product</button>
            </div>
        </div>
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
