 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check out</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">  
    <link rel="stylesheet" href="/styles/UC06_style.css">
</head>
    <body>
    <div class="logo">
        <a href="#">Grocery Store</a>
        <input type="text" class="form-control" id="search" placeholder="Search">
        <button type="submit" class="btn btn-primary">Search</button>
        <a href="#">Cart</a>
    </div>
    <div class="main">
        <div class="checkout">
        <p>Please input checkout information</p>
        <input type="text" id="fname" placeholder="First Name">
        <input type="text" id="lname" placeholder="Last Name">
        <input type="text" id="card" placeholder="Card Number">
        <input type="text" id="experation" placeholder="Experation Date">
        <input type="text" id="cvv" placeholder="CVV">
        <Button>Check out</button>
        </div>
        <div class="cart">
            <p>Your Cart</p>
            <table style=width:100%>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Cost</th>
            </tr>
            <tr>
                <td>A</td>
                <td>5</td>
                <td>$3.00</td>
            </tr>
            <tr>
                <td>B</td>
                <td>2</td>
                <td>$10.00</td>
            </tr>
            <tr>
                <td>C</td>
                <td>10</td>
                <td>$7.00</td>
            </tr>
            <tr>
                <td></td>
                <th>Subtotal</th>
                <td>$20.00</td>
            </tr>
            <tr>
                <td></td>
                <th>Tax</th>
                <td>$1.60</td>
            </tr>
            <tr>
                <td></td>
                <th>Total</th>
                <td>$21.60</td>
            </tr>
            </table>
        </div>
    </div>
    </body>
</html>
